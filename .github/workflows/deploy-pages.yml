name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure production API URL
        env:
          RACE_THE_CITY_API_URL: ${{ vars.RACE_THE_CITY_API_URL || 'https://api.racethecity.app' }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          fs.writeFileSync(
            'public/config.js',
            `window.RACE_THE_CITY_API_URL = ${JSON.stringify(process.env.RACE_THE_CITY_API_URL)};\n`
          );
          NODE

      - name: Build frontend
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          cp dist/frontend/browser/index.html dist/frontend/browser/404.html
          touch dist/frontend/browser/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/frontend/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
